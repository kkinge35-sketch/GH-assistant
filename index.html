<script>
    document.getElementById('hasWindow').addEventListener('change', function() {
        const windowFields = document.getElementById('windowFields');
        if (this.value === 'y') {
            windowFields.classList.add('visible');
        } else {
            windowFields.classList.remove('visible');
        }
    });

    document.getElementById('layoutForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const errorDiv = document.getElementById('errorMsg');
        
        btn.disabled = true;
        btn.textContent = 'Sending to Telegram...';
        errorDiv.style.display = 'none';

        // ==========================
        // CONFIGURE THESE 2 VALUES:
        const TELEGRAM_TOKEN = '8723447514:AAHYBlk1hCJ8K0tjCCHAfOCDqjsyM5MpUJk';  // Paste from BotFather
        const CHAT_ID = '8535059881';           // Paste from userinfobot
        // ==========================

        if (TELEGRAM_TOKEN === '8723447514:AAHYBlk1hCJ8K0tjCCHAfOCDqjsyM5MpUJk') {
            errorDiv.innerHTML = '<strong>Error:</strong> Please add your Telegram Bot Token and Chat ID in the code!';
            errorDiv.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '📤 Submit All 13 Answers to Kimi Claw';
            return;
        }

        // Format message for Telegram
        const formData = {
            timestamp: new Date().toLocaleString(),
            q1_wallWidth: document.getElementById('wallWidth').value,
            q2_wallHeight: document.getElementById('wallHeight').value,
            q3_hasWindow: document.getElementById('hasWindow').value,
            q4_windowWidth: document.getElementById('windowWidth').value,
            q5_windowHeight: document.getElementById('windowHeight').value,
            q6_windowSide: document.getElementById('windowSide').value,
            q7_windowDistance: document.getElementById('windowDistance').value,
            q8_sinkSide: document.getElementById('sinkSide').value,
            q9_sinkDistance: document.getElementById('sinkDistance').value,
            q10_sinkWidth: document.getElementById('sinkWidth').value,
            q11_dishwasherSide: document.getElementById('dishwasherSide').value,
            q12_stoveSide: document.getElementById('stoveSide').value,
            q13_stoveDistance: document.getElementById('stoveDistance').value
        };

        // Create formatted message
        const message = `🦞 <b>New Kitchen Layout Submission</b>

📐 <b>Wall (Q1-2):</b>
• Width: ${formData.q1_wallWidth}"
• Height: ${formData.q2_wallHeight}"

🪟 <b>Window (Q3-7):</b>
• Has Window: ${formData.q3_hasWindow}
• Width: ${formData.q4_windowWidth || 'N/A'}"
• Height: ${formData.q5_windowHeight || 'N/A'}"
• Side: ${formData.q6_windowSide || 'N/A'}
• Distance: ${formData.q7_windowDistance || 'N/A'}

🚰 <b>Sink (Q8-10):</b>
• Side: ${formData.q8_sinkSide}
• Distance: ${formData.q9_sinkDistance}
• Base Width: ${formData.q10_sinkWidth}"

🍽️ <b>Dishwasher (Q11):</b>
• Side: ${formData.q11_dishwasherSide} of sink

🔥 <b>Stove (Q12-13):</b>
• Side: ${formData.q12_stoveSide}
• Distance: ${formData.q13_stoveDistance}"

⏰ Submitted: ${formData.timestamp}`;

        try {
            // Send to Telegram
            const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'HTML'
                })
            });

            const result = await response.json();

            if (!result.ok) {
                throw new Error(result.description || 'Failed to send');
            }

            // Show success
            document.getElementById('layoutForm').style.display = 'none';
            document.getElementById('successMsg').style.display = 'block';
            window.scrollTo(0, 0);
            
        } catch (error) {
            console.error('Telegram Error:', error);
            errorDiv.innerHTML = `<strong>Error:</strong> ${error.message}<br><br>
                <small>Make sure your Bot Token and Chat ID are correct.<br>
                Bot Token should look like: 123456:ABC-DEF...<br>
                Chat ID should be numbers only.</small>`;
            errorDiv.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '📤 Submit All 13 Answers to Kimi Claw';
        }
    });
</script>
